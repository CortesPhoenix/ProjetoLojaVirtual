<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="src/css/style.css">
    <title>Cortes Tech Login</title>
</head>
<body>
   <div class="container">
    <div class="content first-content">
        <div class="first-column">
            <h2 class="title title-wh">Já tem uma conta?</h2>
            <p class="description first-description">Clique no botão abaixo</p>
            <p class="description first-description">e continue sua jornada !
            </p>
            <button id="conectar-se" class="btn first-btn">Conectar-se</button>
        </div> <!-- first column -->

        <div class="second-column">
            <h2 class="title title-ca">Crie sua conta</h2>
            <div class="socialmedia"> 
                <ul class="list-sm">
    <a href="">
        <li class="item-sm"><i class="bi bi-facebook"></i></li>
    </a>
    <a href="#">
        <li class="item-sm"><i class="bi bi-google"></i></li>
        </a>
    <a href="#">
        <li class="item-sm"><i class="bi bi-linkedin"></i></li>
    </a>
            </ul>
         </div> <!-- social media -->
        <p class="description">Seja bem-vindo a Cortes Tech !</p>
         <form class="form">

            <label class="label-input" for="">
            <i class="bi bi-person-badge icon-modify"></i>
            <input type="text" placeholder="Nickname">
            </label>

            <label class="label-input icon-modify" for="">
            <i class="bi bi-envelope"></i>    
            <input type="email" placeholder="Email">
            </label>

            <label class="label-input icon-modify" for="">
            <i class="bi bi-lock-fill"></i>    
            <input type="password" placeholder="Senha">
            </label>
            <button class="btn second-btn">Criar conta</button>

         </form>
    </div> <!-- second column -->
    </div><!-- first content -->

    <div class="content second-content">
         <div class="first-column">
            <h2 class="title title-wh">Novo por aqui?</h2>
            <p class="description first-description">use seu email para se registrar</p>
            <p class="description first-description">E inicie sua jornada conosco !</p>
            <button id="registre-se" class="btn first-btn">registre-se</button>
        </div> <!-- first column -->

        <div class="second-column">
            <h2 class="title title-ca"> Cortes Tech.</h2>
            <div class="socialmedia"> 
                <ul class="list-sm">
                <a href="">
        <li class="item-sm"><i class="bi bi-facebook"></i></li>
    </a>
    <a href="#">
        <li class="item-sm"><i class="bi bi-google"></i></li>
        </a>
    <a href="#">
        <li class="item-sm"><i class="bi bi-linkedin"></i></li>
    </a>
            </ul>
         </div> <!-- social media -->
        <p class="description second-description">Faça login para continuar sua jornada!</p>
         <form class="form">

            <label class="label-input icon-modify" for="">
            <i class="bi bi-envelope"></i>    
            <input type="email" placeholder="Email">
            </label>

            <label class="label-input icon-modify" for="">
            <i class="bi bi-lock-fill"></i>    
            <input type="password" placeholder="Senha">
            </label>
            <a href="#" class="password">esqueceu sua senha?</a>
            <button class="btn second-btn">Entrar</button>
         </form>
    </div> <!-- second column -->
   </div><!-- second content -->

   </div> <!-- container -->
    <script src="src/js/index.js"></script>
</body>
</html>
